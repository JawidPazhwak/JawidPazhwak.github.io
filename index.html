<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawid Pazhwak - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Matrix Background -->
    <canvas id="matrix-bg"></canvas>

    <!-- Background Video -->
    <video autoplay loop muted id="background-video">
        <source src="computer-components.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Header -->
    <header>
        <h1 class="typing neon-text">Jawid Pazhwak</h1>
        <p class="glitch neon-text">CSE Enthusiast</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#about" class="nav-link">About</a>
        <a href="#skills" class="nav-link">Skills</a>
        <a href="#projects" class="nav-link">Projects</a>
        <a href="#contact" class="nav-link">Contact</a>
    </nav>

    <!-- About Section -->
    <section id="about">
        <h2>About Me</h2>
        <p class="glitch">I'm a CSE student passionate about technology and coding.</p>
    </section>

    <!-- Skills Section -->
    <section id="skills">
        <h2>Skills</h2>
        <ul id="skills-list"></ul>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <h2>Projects</h2>
        <div id="projects-list"></div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Name" aria-label="Name">
            <input type="email" placeholder="Email" aria-label="Email">
            <textarea placeholder="Message" aria-label="Message"></textarea>
            <button type="submit" class="button">Send</button>
        </form>
    </section>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
